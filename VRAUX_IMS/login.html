<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activation - VRAUX IMS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 1.8rem;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #6c757d;
            border: 2px solid #e1e5e9;
        }

        .btn-secondary:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            max-width: 300px;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: #28a745;
        }

        .notification.error {
            background: #dc3545;
        }

        .notification.info {
            background: #17a2b8;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            text-align: center;
            color: white;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .login-container {
                margin: 20px;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Inventory Management System</h1>
        <div class="subtitle">Powered by VRAUX Technologies</div>
    </div>

    <div class="login-container">
        <h2>System Activation</h2>
        
        <form id="activationForm">
            <div class="form-group">
                <label for="activationCode">Enter Activation Code</label>
                <input type="text" id="activationCode" name="activationCode" placeholder="Enter 12-digit code" maxlength="12" pattern="[0-9]{12}" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Activate System</button>
        </form>
        
        <button type="button" class="btn btn-secondary" onclick="resetActivation()">Reset Activation</button>
    </div>

    <div class="footer">
        <p>&copy; 2026 VRAUX Technologies. All rights reserved.</p>
    </div>

    <div id="notification" class="notification">
        <span id="notificationMessage"></span>
    </div>

    <script>
        // Load authentication codes from localStorage
        function loadAuthenticationCodes() {
            const saved = localStorage.getItem('authenticationCodes');
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch (e) {
                    console.error('Error loading authentication codes:', e);
                    return [];
                }
            }
            return [];
        }

        // Save authentication codes to localStorage
        function saveAuthenticationCodes(codes) {
            localStorage.setItem('authenticationCodes', JSON.stringify(codes));
        }

        // Validate activation code against authentication codes
        function validateActivationCode(code) {
            const authenticationCodes = loadAuthenticationCodes();
            const codeIndex = authenticationCodes.findIndex(item => item.code === code);
            
            if (codeIndex === -1) {
                return { valid: false, message: 'Invalid authentication code. Code not found.' };
            }
            
            const codeItem = authenticationCodes[codeIndex];
            
            if (codeItem.used) {
                return { valid: false, message: 'This authentication code has already been used.' };
            }
            
            return { valid: true, codeIndex, authenticationCodes };
        }

        // Check if already activated
        function checkActivationStatus() {
            const isActivated = localStorage.getItem('vraux_ims_activated');
            const activationCode = localStorage.getItem('vraux_ims_activation_code');
            
            if (isActivated === 'true' && activationCode) {
                // Redirect to main system
                window.location.href = 'stock.html';
                return true;
            }
            return false;
        }

        // Show notification
        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            const messageElement = document.getElementById('notificationMessage');
            
            messageElement.textContent = message;
            notification.className = `notification ${type} show`;
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Handle input formatting (numbers only)
        document.getElementById('activationCode').addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });

        
        // Activate system
        function activateSystem(code, codeIndex, authenticationCodes) {
            // Mark code as used
            authenticationCodes[codeIndex].used = true;
            authenticationCodes[codeIndex].usedAt = new Date().toISOString();
            authenticationCodes[codeIndex].loginTime = new Date().toLocaleTimeString();
            
            // Save updated codes to localStorage
            saveAuthenticationCodes(authenticationCodes);
            
            localStorage.setItem('vraux_ims_activated', 'true');
            localStorage.setItem('vraux_ims_activation_code', code);
            localStorage.setItem('vraux_ims_activation_date', new Date().toISOString());
            
            showNotification('System activated successfully! Redirecting...', 'success');
            
            setTimeout(() => {
                window.location.href = 'stock.html';
            }, 2000);
        }

        // Reset activation
        function resetActivation() {
            if (confirm('Are you sure you want to reset the activation? This will require you to enter the activation code again.')) {
                localStorage.removeItem('vraux_ims_activated');
                localStorage.removeItem('vraux_ims_activation_code');
                localStorage.removeItem('vraux_ims_activation_date');
                
                document.getElementById('activationCode').value = '';
                showNotification('Activation reset successfully. Please enter activation code again.', 'info');
            }
        }

        // Handle form submission
        document.getElementById('activationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const activationCode = document.getElementById('activationCode').value.trim();
            
            if (!activationCode) {
                showNotification('Please enter an activation code.', 'error');
                return;
            }
            
            if (activationCode.length !== 12) {
                showNotification('Invalid activation code format. Enter exactly 12 digits.', 'error');
                return;
            }
            
            // Validate against authentication codes
            const validation = validateActivationCode(activationCode);
            
            if (validation.valid) {
                activateSystem(activationCode, validation.codeIndex, validation.authenticationCodes);
            } else {
                showNotification(validation.message, 'error');
            }
        });


        // Check activation status on page load
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkActivationStatus()) {
                // Focus on activation code input
                document.getElementById('activationCode').focus();
            }
        });

        // Prevent back button after activation
        window.addEventListener('popstate', function(e) {
            if (checkActivationStatus()) {
                history.pushState(null, null, location.href);
            }
        });
    </script>
</body>
</html>
