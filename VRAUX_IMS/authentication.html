<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Authentication System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .code-card {
            transition: all 0.3s ease;
        }
        .code-card:hover {
            transform: translateY(-2px);
        }
        .used-code {
            opacity: 0.6;
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
        }
        .pulse-animation {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">Data Authentication System</h1>
            <p class="text-gray-600">Generate and manage 12-digit authentication codes</p>
        </header>

        <!-- Main Content -->
        <main class="max-w-6xl mx-auto">
            <!-- Generate Codes Section -->
            <section class="bg-white rounded-xl shadow-lg p-6 mb-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold text-gray-800">Authentication Codes</h2>
                    <div class="flex space-x-3">
                        <button onclick="generateCodes()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition duration-200 shadow-md">
                            Generate New Codes
                        </button>
                    </div>
                </div>

                <!-- Codes Grid -->
                <div id="codesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Codes will be generated here -->
                </div>

                <!-- No Codes Message -->
                <div id="noCodesMessage" class="text-center py-12 text-gray-500">
                    <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                    <p class="text-lg">No authentication codes generated yet</p>
                    <p class="text-sm mt-2">Click "Generate New Codes" to create 10 unique 12-digit codes</p>
                </div>
            </section>

            <!-- Authentication Section -->
            <section class="bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-2xl font-semibold text-gray-800 mb-6">Authenticate Login</h2>
                <div class="max-w-md mx-auto">
                    <form onsubmit="authenticateCode(event)" class="space-y-4">
                        <div>
                            <label for="authCode" class="block text-sm font-medium text-gray-700 mb-2">
                                Enter 12-digit Authentication Code
                            </label>
                            <input 
                                type="text" 
                                id="authCode" 
                                maxlength="12"
                                pattern="[0-9]{12}"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-center text-lg font-mono"
                                placeholder="000000000000"
                                required
                            >
                            <p class="text-xs text-gray-500 mt-1">Enter exactly 12 digits</p>
                        </div>
                        <button 
                            type="submit" 
                            class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 shadow-md"
                        >
                            Authenticate
                        </button>
                    </form>
                    
                    <!-- Authentication Result -->
                    <div id="authResult" class="mt-6 hidden">
                        <!-- Result will be shown here -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Store authentication codes in memory
        let authenticationCodes = [];

        // Generate 12-digit random number
        function generate12DigitCode() {
            let code = '';
            for (let i = 0; i < 12; i++) {
                code += Math.floor(Math.random() * 10);
            }
            return code;
        }

        // Generate 10 unique authentication codes
        function generateCodes() {
            authenticationCodes = [];
            const codesSet = new Set();
            
            // Generate unique codes
            while (codesSet.size < 10) {
                codesSet.add(generate12DigitCode());
            }
            
            // Convert to array with metadata
            authenticationCodes = Array.from(codesSet).map(code => ({
                code: code,
                createdAt: new Date().toISOString(),
                used: false,
                usedAt: null,
                loginTime: null
            }));

            // Save to localStorage
            saveToLocalStorage();
            
            displayCodes();
            showNotification('10 new authentication codes generated successfully!', 'success');
        }

        // Display codes in the grid
        function displayCodes() {
            const container = document.getElementById('codesContainer');
            const noCodesMessage = document.getElementById('noCodesMessage');
            
            if (authenticationCodes.length === 0) {
                container.innerHTML = '';
                noCodesMessage.style.display = 'block';
                return;
            }
            
            noCodesMessage.style.display = 'none';
            container.innerHTML = authenticationCodes.map((item, index) => `
                <div class="code-card border rounded-lg p-4 ${item.used ? 'used-code border-gray-300' : 'border-blue-200 bg-blue-50'}">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-sm font-semibold text-gray-600">Code #${index + 1}</span>
                        ${item.used ? 
                            '<span class="bg-red-100 text-red-800 text-xs font-medium px-2 py-1 rounded">USED</span>' : 
                            '<span class="bg-green-100 text-green-800 text-xs font-medium px-2 py-1 rounded">ACTIVE</span>'
                        }
                    </div>
                    <div class="font-mono text-lg font-bold text-center py-2 ${item.used ? 'text-gray-500' : 'text-blue-700'} break-all">
                        ${item.code}
                    </div>
                    <div class="text-xs text-gray-500 mt-3 space-y-1">
                        <div>Created: ${formatDateTime(item.createdAt)}</div>
                        ${item.used ? `<div>Used: ${formatDateTime(item.usedAt)}</div>` : ''}
                        ${item.loginTime ? `<div>Login Time: ${item.loginTime}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // Format date and time
        function formatDateTime(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleString();
        }

        // Authenticate code
        function authenticateCode(event) {
            event.preventDefault();
            
            const inputCode = document.getElementById('authCode').value;
            const resultDiv = document.getElementById('authResult');
            
            // Find the code
            const codeIndex = authenticationCodes.findIndex(item => item.code === inputCode);
            
            if (codeIndex === -1) {
                showAuthResult('Invalid authentication code. Code not found.', 'error');
                return;
            }
            
            const codeItem = authenticationCodes[codeIndex];
            
            if (codeItem.used) {
                showAuthResult('This authentication code has already been used.', 'error');
                return;
            }
            
            // Mark code as used
            codeItem.used = true;
            codeItem.usedAt = new Date().toISOString();
            codeItem.loginTime = new Date().toLocaleTimeString();
            
            // Save to localStorage
            saveToLocalStorage();
            
            // Update display
            displayCodes();
            
            // Show success message
            showAuthResult('Authentication successful! You are now logged in.', 'success');
            
            // Clear input
            document.getElementById('authCode').value = '';
            
            // Show notification
            showNotification('Authentication successful!', 'success');
        }

        // Show authentication result
        function showAuthResult(message, type) {
            const resultDiv = document.getElementById('authResult');
            resultDiv.classList.remove('hidden');
            
            const bgColor = type === 'success' ? 'bg-green-50 border-green-200 text-green-800' : 'bg-red-50 border-red-200 text-red-800';
            const icon = type === 'success' ? 
                '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>' :
                '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>';
            
            resultDiv.innerHTML = `
                <div class="border rounded-lg p-4 ${bgColor} flex items-center space-x-3">
                    ${icon}
                    <p class="font-medium">${message}</p>
                </div>
            `;
        }

        // Show notification
        function showNotification(message, type) {
            // Create notification element
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg z-50 transform transition-all duration-300 ${
                type === 'success' ? 'bg-green-600 text-white' : 'bg-red-600 text-white'
            }`;
            notification.innerHTML = `
                <div class="flex items-center space-x-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        ${type === 'success' ? 
                            '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>' :
                            '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>'
                        }
                    </svg>
                    <span>${message}</span>
                </div>
            `;
            
            document.body.appendChild(notification);
            
            // Remove after 3 seconds
            setTimeout(() => {
                notification.style.transform = 'translateX(400px)';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        // Save to localStorage
        function saveToLocalStorage() {
            localStorage.setItem('authenticationCodes', JSON.stringify(authenticationCodes));
        }

        // Load from localStorage
        function loadFromLocalStorage() {
            const saved = localStorage.getItem('authenticationCodes');
            if (saved) {
                try {
                    authenticationCodes = JSON.parse(saved);
                } catch (e) {
                    console.error('Error loading saved codes:', e);
                    authenticationCodes = [];
                }
            }
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            loadFromLocalStorage();
            displayCodes();
        });


        // Format input as user types (only numbers)
        document.getElementById('authCode').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
